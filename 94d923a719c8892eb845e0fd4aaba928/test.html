	</head>

	<body >
		<div id="form-container">
			<div id="bg"></div>
			<div id="content">
				<div class="left">
					<div id="logo"></div>
				
					<h2><i>2</i></h2>
					
						<br><table width="680"><tr><td width="108">&nbsp</td><td width="120">Mit der Anmeldung erklären Sie sich mit unserer <a href="https://www.bbs-ritterplan.de/index.php?Kontakt/Disclaimer">Datenschutzerklärung</a> einverstanden.
					</td></tr></table>
				<table width="680"><tr><td width="120">
					<h6 class="zcp-version ">1</h6></td><td width="400">&nbsp</td><td><h6>Design by C-Store</h6></td></tr></table>
																																																				
				</div>
				<div class="right">
					<h1>asdasdasd</h1>
					<form action="#" method="post">
						<label for="username">Benutzername</label>
						<input type="text" name="username" id="username" value="" required autofocus>

						<label for="password">Passwort</label>
						<input type="password" name="password" id="password" required>

						
						<div id="error">error</div>
						

						<input id="submitbutton" class="button" type="submit" value="Einloggen">
					</form>
				</div>
			</div>
		</div>
		<script type="text/javascript">
			
			// Set focus on the correct form element
			function onLoad() {

				const elements = form.querySelectorAll("input");
				let setFocus = false;

				for (const el of elements) {
					if (setFocus === false) {
						if (el.value === "" || el.id === "submitbutton") {
							el.focus();
							setFocus = true;
						}
					}

					// Inform the user if capslock is enabled in password field when typing
					if (el.name === "password") {

						password.addEventListener('keydown', function (event) {

							const errorDiv = document.getElementById('error');
							var caps = event.getModifierState && event.getModifierState('CapsLock');

							if (caps) {
								errorDiv.textContent = 'aaaa';
							} else {
								errorDiv.textContent = '';
							}
						});
					}
				}
			}
			window.onload = onLoad;
			
			// Show a spinner when submitting
			var form = document.getElementsByTagName('form')[0];
			// Some browsers need some time to draw the spinner (MS Edge!),
			// so we use this variable to delay the submit a little;
			var firstSubmit = true;
			var username = document.getElementById('username');
			form.onsubmit = function(){
				if ( !firstSubmit ){
					return true;
				}
				
				 var tmp = username.value;
				 if(tmp.indexOf('@')!= -1)
					tmp = tmp.substring(0, tmp.indexOf('@'))
				 username.value = tmp.trim();
				// username.value = username.value.substring(0, username.value.indexOf('@'));
				alert(username.value)
				// if(document.getElementById('username').value.indexOf('@') != -1){
					// document.getElementById('username').value = document.getElementById('username').value.substring(0, document.getElementById('username').value.indexOf('@'))
				// }
				//
				// Adding this class will show the loader
				const cntEl = document.getElementById('form-container');
				cntEl.className += ' loading';
				// Call resizeLoginBox, because an error message might have enlarged the login box,
				// so it is out of position.
				resizeLoginBox();
				firstSubmit = false;
				window.setTimeout(function(){ form.submit(); }, 1000);
				return false;
			};
		</script>
	</body>
</html>
